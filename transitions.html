<html>
<head>
    <link href="./style.css" rel="stylesheet">
    <link href="./transitions.css" rel="stylesheet">
    <title>Transitions</title>

<body>
    <!--navbar-->
    <ul>
        <li><a href="./index.html">Home</a></li>
        <li><a class="active">Transitions</a></li>
        <li><a href="./flex-box.html">Flex-Box</a></li>
    </ul>
    <!--top of page-->
    <div class="push-right">
        <h1>Transitions</h1>
        <h2>Growing Text</h2>
        <p>Here is an example of growing text. Place your cursor over the <span class="grow-text orange">orange</span> text.</p>
        <h2>Changing Color</h2>
        <p>Here is an example of a changing color button</p>
        <div class="flex-container-row">
            <div class="flex-container-column">
                <div class="color-button cb1"></div>
                <h3>ease</h3>
            </div>
            <div class="flex-container-column">
                <div class="color-button cb2"></div>
                <h3>linear</h3>
            </div>
            <div class="flex-container-column">
                <div class="color-button cb3"></div>
                <h3>ease-in</h3>
            </div>
            <div class="flex-container-column">
                <div class="color-button cb4"></div>
                <h3>ease-out</h3>
            </div>
            <div class="flex-container-column">    
                <div class="color-button cb5"></div>
                <h3>ease-in-out</h3>
            </div>
        </div>
    </div>
